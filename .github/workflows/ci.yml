name: CI

on:
  pull_request:
    branches:
      - main
      - stage
  push:
    branches:
      - main
      - stage

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_PASSWORD: secret
          POSTGRES_USER: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_DATABASE: testing
      DB_HOST: 127.0.0.1
      DB_PASSWORD: secret
      DB_PORT: 5432
      DB_USERNAME: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo_pgsql

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Check formatting
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm --filter @wasiy/web lint

      - name: Test web app
        run: pnpm --filter @wasiy/web test

      - name: Build web app
        run: pnpm --filter @wasiy/web build
